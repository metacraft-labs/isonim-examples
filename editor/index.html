<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IsoNim Examples Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- TBAR-M5b: vendored TipTap + xterm UMD bundles produced by
         the ``editor-vendor`` Nix derivation
         (``isonim/nix/editor-vendor.nix``).  The editor-build recipe
         copies them into ``build/editor/vendor/``.  Each bundle
         attaches its library to a named ``globalThis`` namespace
         consumed by the per-library Nim FFI modules under
         ``isonim/src/isonim/editor/vendor/``:
           * ``tiptap.umd.js``  → ``globalThis.TipTap`` + ``TipTapStarterKit`` +
                                  ``TipTapMarkdown``
           * ``xterm.umd.js``   → ``globalThis.XtermTerminal``.
         The xterm.css is copied next to xterm.umd.js since xterm
         5.3.0 still ships its terminal styles as a separate
         stylesheet rather than self-injecting them. -->
    <link rel="stylesheet" href="vendor/xterm.css" />
    <script src="vendor/xterm.umd.js"></script>
    <script src="vendor/tiptap.umd.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      /* ---------------------------------------------------------------- *
       * CHRM-M3 Wave A — spec-pane TipTap typography.
       *
       * TipTap's StarterKit ships intentionally style-light defaults so
       * each consumer applies its own design tokens. Without these
       * rules every heading and body paragraph renders at the same font
       * size + weight, which kills the "this is a long-form brief"
       * reading affordance the spec pane needs.
       *
       * The selectors live on the ProseMirror root injected inside the
       * spec pane's `data-spec-pane-tiptap-host`. Confined to that
       * scope so they cannot leak into the per-backend preview
       * iframes (which already have their own design system).
       * ---------------------------------------------------------------- */
      [data-spec-pane-tiptap-host="true"] .ProseMirror {
        font-family: -apple-system, BlinkMacSystemFont, "Inter",
                     "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: #E8E9F0;
        /* Constrain prose to a comfortable reading column. 760 px
         * approximates 60-80ch at 14 px body. Centred via auto
         * margins; the surrounding spec pane keeps its own padding. */
        max-width: 760px;
        margin: 0 auto;
        padding-bottom: 32px;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror:focus {
        outline: none;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror > * + * {
        /* Default whitespace between sibling block elements. */
        margin-top: 12px;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror h1 {
        font-size: 28px;
        font-weight: 700;
        line-height: 1.25;
        color: #F5F5F7;
        margin-top: 28px;
        margin-bottom: 8px;
        letter-spacing: -0.01em;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror h1:first-child {
        margin-top: 4px;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror h2 {
        font-size: 20px;
        font-weight: 600;
        line-height: 1.3;
        color: #F5F5F7;
        margin-top: 24px;
        margin-bottom: 6px;
        letter-spacing: -0.005em;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror h3 {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.4;
        color: #F5F5F7;
        margin-top: 20px;
        margin-bottom: 4px;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror p {
        font-size: 14px;
        line-height: 1.65;
        color: #D5D6DB;
        margin-top: 8px;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror p:first-child {
        margin-top: 0;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror strong {
        font-weight: 600;
        color: #F5F5F7;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror em {
        font-style: italic;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror a {
        color: #8E8EE6;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror a:hover {
        color: #A8A8F0;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror code {
        font-family: ui-monospace, SFMono-Regular, "Menlo", "Consolas",
                     monospace;
        font-size: 0.88em;
        background: #1D1D28;
        color: #C8C9D6;
        padding: 1px 6px;
        border-radius: 4px;
        border: 1px solid #2A2B36;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror pre {
        font-family: ui-monospace, SFMono-Regular, "Menlo", "Consolas",
                     monospace;
        font-size: 12.5px;
        line-height: 1.55;
        background: #14141C;
        color: #D5D6DB;
        padding: 12px 14px;
        border-radius: 6px;
        border: 1px solid #2A2B36;
        overflow-x: auto;
        margin-top: 12px;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror pre code {
        background: transparent;
        border: 0;
        padding: 0;
        font-size: inherit;
        color: inherit;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror blockquote {
        margin-top: 12px;
        padding: 4px 14px;
        border-left: 3px solid #4B4B6A;
        color: #A0A2B0;
        font-style: italic;
        background: rgba(255, 255, 255, 0.02);
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror blockquote p {
        color: #A0A2B0;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror ul,
      [data-spec-pane-tiptap-host="true"] .ProseMirror ol {
        padding-left: 24px;
        margin-top: 8px;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror li {
        margin-top: 4px;
        line-height: 1.6;
        color: #D5D6DB;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror li > p {
        margin-top: 0;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror li > ul,
      [data-spec-pane-tiptap-host="true"] .ProseMirror li > ol {
        margin-top: 4px;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror hr {
        border: 0;
        border-top: 1px solid #2A2B36;
        margin: 24px 0;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror table {
        border-collapse: collapse;
        margin-top: 12px;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror th,
      [data-spec-pane-tiptap-host="true"] .ProseMirror td {
        border: 1px solid #2A2B36;
        padding: 6px 10px;
        text-align: left;
      }
      [data-spec-pane-tiptap-host="true"] .ProseMirror th {
        background: #1D1D28;
        font-weight: 600;
      }
      /* Custom scrollbar for the spec pane wrapper. */
      [data-spec-pane-tiptap="true"]::-webkit-scrollbar {
        width: 10px;
      }
      [data-spec-pane-tiptap="true"]::-webkit-scrollbar-track {
        background: transparent;
      }
      [data-spec-pane-tiptap="true"]::-webkit-scrollbar-thumb {
        background: #2A2B36;
        border-radius: 6px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      [data-spec-pane-tiptap="true"]::-webkit-scrollbar-thumb:hover {
        background: #3A3B46;
        background-clip: padding-box;
        border: 2px solid transparent;
      }
    </style>
  </head>
  <body>
    <!-- Cache-bust based on build time so refreshes pick up the latest editor.js.
         Python's http.server doesn't send no-cache headers; without the
         versioned query, browsers serve a stale bundle indefinitely. -->
    <script>document.write('<script src="editor.js?v=' + Date.now() + '"><\/script>');</script>
  </body>
</html>
